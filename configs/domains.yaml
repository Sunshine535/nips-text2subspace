base_model: "Qwen/Qwen3-8B"
output_root: "./results/domain_loras"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  task_type: "CAUSAL_LM"

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 2
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 10
  save_steps: 200
  max_seq_length: 2048
  gradient_checkpointing: true
  deepspeed: null
  dataloader_num_workers: 4

domains:
  math:
    name: "Mathematics"
    datasets:
      - "TIGER-Lab/MathInstruct"
    max_samples: 20000
    system_prompt: "You are a mathematics expert. Solve problems step by step with rigorous reasoning."

  code:
    name: "Code Generation"
    datasets:
      - "sahil2801/CodeAlpaca-20k"
    max_samples: 20000
    system_prompt: "You are an expert programmer. Write clean, efficient, well-documented code."

  medical:
    name: "Medical"
    datasets:
      - "medalpaca/medical_meadow_medical_flashcards"
    max_samples: 20000
    system_prompt: "You are a medical expert. Provide accurate, evidence-based medical information."

  legal:
    name: "Legal"
    datasets:
      - "nguha/legalbench"
    max_samples: 20000
    system_prompt: "You are a legal expert. Provide precise legal analysis and reasoning."

  finance:
    name: "Finance"
    datasets:
      - "AdaptLLM/finance-tasks"
    max_samples: 20000
    system_prompt: "You are a finance expert. Provide accurate financial analysis and reasoning."

  science:
    name: "Science"
    datasets:
      - "allenai/sciq"
    max_samples: 20000
    system_prompt: "You are a science expert. Explain scientific concepts clearly and accurately."

  history:
    name: "History"
    datasets:
      - "cais/mmlu"
    subset: "high_school_world_history"
    max_samples: 20000
    system_prompt: "You are a history expert. Provide detailed, accurate historical analysis."

  geography:
    name: "Geography"
    datasets:
      - "cais/mmlu"
    subset: "high_school_geography"
    max_samples: 20000
    system_prompt: "You are a geography expert. Provide accurate geographical knowledge and analysis."

  philosophy:
    name: "Philosophy"
    datasets:
      - "cais/mmlu"
    subset: "philosophy"
    max_samples: 20000
    system_prompt: "You are a philosophy expert. Engage in deep, rigorous philosophical reasoning."

  psychology:
    name: "Psychology"
    datasets:
      - "cais/mmlu"
    subset: "high_school_psychology"
    max_samples: 20000
    system_prompt: "You are a psychology expert. Provide evidence-based psychological analysis."

  creative_writing:
    name: "Creative Writing"
    datasets:
      - "lmsys/chatbot_arena_conversations"
    max_samples: 20000
    system_prompt: "You are a creative writer. Craft engaging, imaginative, and well-structured text."
    eval_mode: "synthetic"  # no automated benchmark; qualitative eval only

  translation:
    name: "Translation"
    datasets:
      - "FreedomIntelligence/alpaca-gpt4-zh"
    max_samples: 20000
    system_prompt: "You are a multilingual translation expert. Translate accurately preserving meaning and style."
    eval_mode: "synthetic"  # no automated benchmark; qualitative eval only

algebra:
  interpolation_alphas: [0.0, 0.25, 0.5, 0.75, 1.0]
  grassmann_dim: 64
  svd_rank: 32

ablation:
  ranks: [4, 8, 16, 32, 64]
  normalization: [true, false]
  interpolation_types: ["linear", "geodesic", "chord"]
  compose_counts: [2, 3, 4, 6, 12]

evaluation:
  benchmarks:
    math: ["gsm8k", "math"]
    code: ["humaneval", "mbpp"]
    medical: ["medqa"]
    legal: ["legalbench"]
    finance: ["finqa"]
    science: ["arc_challenge"]
    history: ["mmlu_high_school_world_history"]
    geography: ["mmlu_high_school_geography"]
    philosophy: ["mmlu_philosophy"]
    psychology: ["mmlu_high_school_psychology"]
    creative_writing: ["alpaca_eval"]
    translation: ["flores"]
  max_eval_samples: 500
  batch_size: 8
